<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小米运动健康 Claw — 原型总览</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'SF Pro Display', 'Helvetica Neue', sans-serif;
  background: #0a0a0f;
  color: #e8e8ec;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
}
.hub {
  max-width: 720px;
  width: 100%;
}
.hub h1 {
  font-size: 32px;
  font-weight: 700;
  text-align: center;
  margin-bottom: 8px;
  background: linear-gradient(135deg, #4ADE80, #22C55E);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.hub .subtitle {
  text-align: center;
  color: #888;
  font-size: 14px;
  margin-bottom: 48px;
}
.cards {
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.card {
  display: flex;
  align-items: center;
  gap: 20px;
  padding: 24px 28px;
  border-radius: 16px;
  background: #16161b;
  border: 1px solid #2a2a30;
  text-decoration: none;
  color: inherit;
  transition: all .25s ease;
}
.card:hover {
  background: #1e1e25;
  border-color: #4ADE80;
  transform: translateY(-2px);
  box-shadow: 0 8px 32px rgba(74,222,128,.12);
}
.card .icon {
  width: 56px;
  height: 56px;
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  flex-shrink: 0;
}
.card .icon.green { background: rgba(74,222,128,.12); }
.card .icon.blue { background: rgba(56,189,248,.12); }
.card .icon.purple { background: rgba(139,92,246,.12); }
.card .icon.orange { background: rgba(245,158,11,.12); }
.card .info h3 {
  font-size: 17px;
  font-weight: 600;
  margin-bottom: 4px;
}
.card .info p {
  font-size: 13px;
  color: #888;
  line-height: 1.5;
}
.card .arrow {
  margin-left: auto;
  color: #555;
  font-size: 20px;
  transition: transform .2s;
}
.card:hover .arrow {
  color: #4ADE80;
  transform: translateX(4px);
}
</style>
</head>
<body>
<div class="hub">
  <h1>小米运动健康 Claw</h1>
  <p class="subtitle">产品原型与架构设计文档合集</p>
  <div class="cards">
    <a class="card" href="index.html">
      <div class="icon purple">🏗</div>
      <div class="info">
        <h3>体系全景架构图</h3>
        <p>Claw 系统完整架构 — 输入层、处理层、分析层、干预层、AI编排层</p>
      </div>
      <span class="arrow">→</span>
    </a>
    <a class="card" href="claw-watch-prototype.html">
      <div class="icon green">⌚</div>
      <div class="info">
        <h3>手表端交互原型</h3>
        <p>12个圆形手表屏幕 — 表盘、通知、运动AI教练、晨间简报等完整交互</p>
      </div>
      <span class="arrow">→</span>
    </a>
    <a class="card" href="health-home-v3.html">
      <div class="icon blue">📱</div>
      <div class="info">
        <h3>手机端健康首页原型</h3>
        <p>App 健康首页 — 状态分、AI发现、风险卡片、今日行动、健康趋势</p>
      </div>
      <span class="arrow">→</span>
    </a>
    <a class="card" href="health-guardian-v2.html">
      <div class="icon orange">🛡</div>
      <div class="info">
        <h3>健康守卫 App 重设计</h3>
        <p>运动健康 App 整体重设计方案原型</p>
      </div>
      <span class="arrow">→</span>
    </a>
  </div>
</div>
</body>
</html>
